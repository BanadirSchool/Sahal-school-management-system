<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sahal Schools | Management System 2030</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 50%, #1e1b3e 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0f1e, #0f172a, #1a1a2e);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: all 0.5s ease;
        }

        .login-card {
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(20px);
            padding: 45px 40px;
            border-radius: 32px;
            width: 90%;
            max-width: 420px;
            border: 1px solid rgba(249, 115, 22, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease;
        }

        .login-card h2 {
            color: #f97316;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .login-card h2 i {
            margin-right: 12px;
        }

        .login-card p {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .login-input {
            width: 100%;
            padding: 14px 20px 14px 50px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(249, 115, 22, 0.4);
            border-radius: 50px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s;
        }

        .login-input:focus {
            border-color: #f97316;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.5);
        }

        .dashboard {
            display: none;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: rgba(10, 20, 35, 0.98);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(249, 115, 22, 0.3);
            transform: translateX(0);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 150;
            overflow-y: auto;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
        }

        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(249, 115, 22, 0.3);
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.1), transparent);
        }

        .sidebar-header h3 {
            color: #f97316;
            font-size: 22px;
        }

        .sidebar-header h3 i {
            margin-right: 10px;
        }

        .sidebar-header p {
            color: #94a3b8;
            font-size: 12px;
            margin-top: 8px;
        }

        .nav-item {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 3px solid transparent;
            margin: 4px 8px;
            border-radius: 12px;
        }

        .nav-item:hover {
            background: rgba(249, 115, 22, 0.15);
            color: #f97316;
            transform: translateX(5px);
        }

        .nav-item.active {
            background: rgba(249, 115, 22, 0.2);
            border-left-color: #f97316;
            color: #f97316;
        }

        .nav-item i {
            width: 28px;
            font-size: 20px;
            text-align: center;
        }

        .main-content {
            margin-left: 280px;
            transition: margin-left 0.4s;
            padding: 20px;
            min-height: 100vh;
        }

        .main-content.sidebar-hidden {
            margin-left: 0;
        }

        .top-bar {
            background: linear-gradient(135deg, rgba(139, 69, 19, 0.9), rgba(249, 115, 22, 0.8));
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 18px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .top-bar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1), transparent);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .menu-toggle {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.5);
            color: #ffd700;
            font-size: 26px;
            cursor: pointer;
            padding: 10px 16px;
            border-radius: 16px;
            transition: all 0.3s;
            z-index: 1;
        }

        .menu-toggle:hover {
            background: #ffd700;
            color: #8B4513;
            transform: scale(1.05);
        }

        .school-title {
            text-align: center;
            z-index: 1;
        }

        .school-title h1 {
            font-size: 26px;
            background: linear-gradient(135deg, #ffffff, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .school-title h1 i {
            background: none;
            -webkit-background-clip: unset;
            color: #ffd700;
            margin-right: 12px;
        }

        .school-title p {
            color: #ffd700;
            font-size: 13px;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .logout-top {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.5);
            color: #ffd700;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 1;
        }

        .logout-top:hover {
            background: #ffd700;
            color: #8B4513;
        }

        .content-card {
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 28px;
            border: 1px solid rgba(249, 115, 22, 0.25);
            animation: fadeInUp 0.4s ease;
        }

        .content-card h2 {
            color: #f97316;
            margin-bottom: 25px;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #f6900b;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group label i {
            margin-right: 8px;
            color: #f97316;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(249, 115, 22, 0.4);
            border-radius: 16px;
            color: rgb(255, 141, 3);
            font: bold;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #f97316;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #f97316, #ea580c);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 12px;
            font-size: 14px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(249, 115, 22, 0.5);
            padding: 12px 28px;
            border-radius: 40px;
            color: #f97316;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-secondary:hover {
            background: rgba(249, 115, 22, 0.2);
            transform: translateY(-2px);
        }

        .btn-edit {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #22c55e;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
            transition: all 0.2s;
        }

        .btn-edit:hover {
            background: #22c55e;
            color: white;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 20px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
        }

        .data-table th {
            background: linear-gradient(135deg, #8B4513, #a0522d);
            color: #ffd700;
            padding: 14px 12px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            border-bottom: 2px solid #ffd700;
        }

        .data-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            font-size: 13px;
        }

        .data-table tr:hover {
            background: rgba(249, 115, 22, 0.1);
        }

        .pass-badge {
            background: #22c55e;
            color: white;
            padding: 5px 12px;
            border-radius: 30px;
            display: inline-block;
            font-weight: bold;
            font-size: 12px;
        }

        .fail-badge {
            background: #ef4444;
            color: white;
            padding: 5px 12px;
            border-radius: 30px;
            display: inline-block;
            font-weight: bold;
            font-size: 12px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(249, 115, 22, 0.4);
            border-radius: 40px;
            color: white;
            font-size: 14px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(15, 25, 45, 0.98), rgba(25, 35, 55, 0.98));
            border-radius: 28px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(249, 115, 22, 0.4);
            animation: fadeInScale 0.3s ease;
        }

        .modal-content h3 {
            color: #f97316;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 25px;
        }

        .statement-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(249, 115, 22, 0.3);
            padding-bottom: 10px;
        }

        .statement-tab {
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            color: #cbd5e1;
            font-weight: 500;
        }

        .statement-tab:hover {
            background: rgba(249, 115, 22, 0.2);
            color: #f97316;
        }

        .statement-tab.active {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
        }

        .payment-statement-summary {
            background: rgba(34, 197, 94, 0.1);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .amount-paid {
            color: #22c55e;
            font-weight: bold;
        }

        .remaining-negative {
            color: #ef4444;
            font-weight: bold;
        }

        @media print {
            .no-print, .sidebar, .top-bar, button, .menu-toggle, .logout-top, .nav-item, .btn-primary, .btn-secondary, .btn-edit, .btn-delete, .statement-tabs {
                display: none !important;
            }
            .main-content, .main-content.sidebar-hidden {
                margin-left: 0 !important;
                padding: 0 !important;
            }
            .content-card {
                background: white !important;
                padding: 20px !important;
            }
            .data-table th {
                background: #8B4513 !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
            }
            .school-title h1 {
                font-size: 16px;
            }
            .statement-tabs {
                flex-direction: column;
                gap: 8px;
            }
            .statement-tab {
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="login-container" id="loginContainer">
    <div class="login-card">
        <h2><i class="fas fa-school"></i> SAHAL SCHOOLS</h2>
        <p>Management System 2030 | Waxbarashada Mustaqbalkaaga</p>
        <div style="position: relative;">
            <i class="fas fa-user" style="position: absolute; left: 18px; top: 45px; color: #f97316;"></i>
            <input type="text" class="login-input" id="loginUsername" placeholder="Username" autocomplete="off">
        </div>
        <div style="position: relative;">
            <i class="fas fa-lock" style="position: absolute; left: 18px; top: 45px; color: #f97316;"></i>
            <input type="password" class="login-input" id="loginPassword" placeholder="Password">
        </div>
        <button class="login-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
    </div>
</div>

<div class="dashboard" id="dashboard">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-graduation-cap"></i> SAHAL</h3>
            <p>School Management System</p>
        </div>
        <div class="nav-item" data-page="register">
            <i class="fas fa-user-plus"></i>
            <span>1. Diiwaan Gali</span>
        </div>
        <div class="nav-item" data-page="students">
            <i class="fas fa-users"></i>
            <span>2. Xogta Ardayda</span>
        </div>
        <div class="nav-item" data-page="exam">
            <i class="fas fa-pen"></i>
            <span>3. Exam</span>
        </div>
        <div class="nav-item" data-page="payment">
            <i class="fas fa-money-bill-wave"></i>
            <span>4. Lacag Qabasho</span>
        </div>
        <div class="nav-item" data-page="statement">
            <i class="fas fa-file-alt"></i>
            <span>5. Statement</span>
        </div>
        <div class="nav-item" data-page="transfer">
            <i class="fas fa-exchange-alt"></i>
            <span>6. Fasal Badalid</span>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-bar no-print">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="school-title">
                <h1><i class="fas fa-school"></i> SAHAL PRIMARY & SECONDARY SCHOOLS</h1>
                <p><i class="fas fa-star"></i> Excellence in Education | Waxbarashada Heerka Sare <i class="fas fa-star"></i></p>
            </div>
            <button class="logout-top" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
        <div id="pageContent"></div>
    </div>
</div>

<script>
    // ==================== DATA STORAGE ====================
    let students = JSON.parse(localStorage.getItem('sahal_students')) || [];
    let payments = JSON.parse(localStorage.getItem('sahal_payments')) || [];
    let examMarks = JSON.parse(localStorage.getItem('sahal_exam_marks')) || [];

    // Demo Data
    if (students.length === 0) {
        students = [
            { id: 'SAH-2025-001', name: 'Ahmed Ali', age: '10', birthPlace: 'Mogadishu', district: 'Hamar Weyne', grade: 'Grade 5', parentName: 'Ali Ahmed', parentPhone: '612345678' },
            { id: 'SAH-2025-002', name: 'Fatima Omar', age: '11', birthPlace: 'Mogadishu', district: 'Wadajir', grade: 'Grade 6', parentName: 'Omar Hassan', parentPhone: '613456789' },
            { id: 'SAH-2025-003', name: 'Hassan Nur', age: '10', birthPlace: 'Mogadishu', district: 'Karaan', grade: 'Aas-aaska', parentName: 'Nur Ahmed', parentPhone: '614567890' },
            { id: 'SAH-2025-004', name: 'Amina Mohamed', age: '12', birthPlace: 'Mogadishu', district: 'Yaqshid', grade: 'Grade 7', parentName: 'Mohamed Ali', parentPhone: '615678901' },
            { id: 'SAH-2025-005', name: 'Omar Abdi', age: '5', birthPlace: 'Mogadishu', district: 'Hodan', grade: 'Baby 1', parentName: 'Abdi Omar', parentPhone: '616789012' },
            { id: 'SAH-2025-006', name: 'Maryam Hassan', age: '8', birthPlace: 'Mogadishu', district: 'Bondhere', grade: 'Grade 3', parentName: 'Hassan Ali', parentPhone: '617890123' }
        ];
        localStorage.setItem('sahal_students', JSON.stringify(students));
        
        // Demo payments
        payments = [
            { id: 1001, studentId: 'SAH-2025-001', studentName: 'Ahmed Ali', amount: 5000, remaining: 0, date: '2025-01-15', note: 'Bisha 1aad' },
            { id: 1002, studentId: 'SAH-2025-001', studentName: 'Ahmed Ali', amount: 5000, remaining: 0, date: '2025-02-10', note: 'Bisha 2aad' },
            { id: 1003, studentId: 'SAH-2025-002', studentName: 'Fatima Omar', amount: 3000, remaining: 2000, date: '2025-01-20', note: 'Bisha 1aad - Qayb' }
        ];
        localStorage.setItem('sahal_payments', JSON.stringify(payments));
    }

    // Months
    const months = [
        { id: 1, name: 'Bisha 1aad' },
        { id: 2, name: 'Bisha 2aad' },
        { id: 3, name: 'Bisha 3aad' },
        { id: 4, name: 'Bisha 4aad' }
    ];

    // ==================== SUBJECTS PER GRADE ====================
    const subjectsByGrade = {
        'Aas-aaska': ['Somali', 'Xisaab', 'Carabi'],
        'Baby 1': ['Somali', 'Xisaab', 'Carabi'],
        'Baby 2': ['Somali', 'Xisaab', 'Carabi', 'English'],
        'Grade 3': ['Somali', 'Xisaab', 'Carabi', 'English', 'C.B'],
        'Grade 4': ['Somali', 'C.B', 'Tarbiyo', 'Carabi', 'Seynis', 'Teknoloji', 'English', 'Xisaab'],
        'Grade 5': ['Somali', 'C.B', 'Tarbiyo', 'Carabi', 'Seynis', 'Teknoloji', 'English', 'Xisaab'],
        'Grade 6': ['Somali', 'C.B', 'Tarbiyo', 'Carabi', 'Seynis', 'Teknoloji', 'English', 'Xisaab'],
        'Grade 7': ['Somali', 'C.B', 'Tarbiyo', 'Carabi', 'Seynis', 'Teknoloji', 'English', 'Xisaab'],
        'Grade 8': ['Somali', 'C.B', 'Tarbiyo', 'Carabi', 'Seynis', 'Teknoloji', 'English', 'Xisaab']
    };

    function getPassMark(grade) {
        const lowerGrades = ['Aas-aaska', 'Baby 1', 'Baby 2', 'Grade 3'];
        if (lowerGrades.includes(grade)) {
            return 50;
        }
        return 60;
    }

    function getSubjectsForGrade(grade) {
        return subjectsByGrade[grade] || [];
    }

    function getStudentMarks(studentId, monthId, grade) {
        const marks = {};
        const subjects = getSubjectsForGrade(grade);
        subjects.forEach(subject => {
            const markEntry = examMarks.find(m => m.studentId === studentId && m.subject === subject && m.monthId === monthId);
            marks[subject] = markEntry ? markEntry.mark : '-';
        });
        return marks;
    }

    function calculateTotalAndAverage(marks, grade) {
        const subjects = getSubjectsForGrade(grade);
        let total = 0;
        let count = 0;
        subjects.forEach(subject => {
            if (marks[subject] !== '-') {
                total += marks[subject];
                count++;
            }
        });
        const average = count > 0 ? (total / count).toFixed(2) : 0;
        return { total, average, count, expectedSubjects: subjects.length };
    }

    function getStatus(grade, average) {
        const passMark = getPassMark(grade);
        const numericAverage = parseFloat(average);
        
        if (!isNaN(numericAverage) && numericAverage > 0) {
            if (numericAverage >= passMark) {
                return { text: 'Baasay', class: 'pass' };
            } else {
                return { text: 'Dhacay', class: 'fail' };
            }
        }
        return { text: 'Lama Qiimayn', class: '' };
    }

    function generateStudentId() {
        let maxId = 0;
        students.forEach(s => {
            let num = parseInt(s.id.split('-')[2]);
            if (num > maxId) maxId = num;
        });
        return `SAH-2025-${String(maxId + 1).padStart(3, '0')}`;
    }

    // ==================== EDIT & DELETE FUNCTIONS ====================
    function editStudent(studentId) {

        if (!student) return;
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content">
                <h3><i class="fas fa-edit"></i> Wax Ka Beddel Xogta Ardayga</h3>
                <form id="editStudentForm">
                    <div class="form-row">
                        <div class="form-group"><label>Magaca Ardayga</label><input type="text" id="editName" value="${student.name}" required></div>
                        <div class="form-group"><label>Da'da</label><input type="number" id="editAge" value="${student.age}" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Goobta Dhalashada</label><input type="text" id="editBirthPlace" value="${student.birthPlace || ''}"></div>
                        <div class="form-group"><label>Dagmada</label><input type="text" id="editDistrict" value="${student.district || ''}"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Fasalka</label><select id="editGrade">
                            ${Object.keys(subjectsByGrade).map(g => `<option ${student.grade === g ? 'selected' : ''}>${g}</option>`).join('')}
                        </select></div>
                        <div class="form-group"><label>Magaca Waalidka</label><input type="text" id="editParentName" value="${student.parentName}" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Numberka Waalidka</label><input type="text" id="editParentPhone" value="${student.parentPhone}" required></div>
                        <div class="form-group"><label>ID</label><input type="text" id="editId" value="${student.id}" readonly></div>
                    </div>
                    <div class="modal-buttons">
                        <button type="button" class="btn-secondary" id="closeModalBtn">Cancel</button>
                        <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Changes</button>
                    </div>
                </form>
            </div>
        `;
        
        document.body.appendChild(modal);
        document.getElementById('closeModalBtn').onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        
        document.getElementById('editStudentForm').onsubmit = (e) => {
            e.preventDefault();
            student.name = document.getElementById('editName').value;
            student.age = document.getElementById('editAge').value;
            student.birthPlace = document.getElementById('editBirthPlace').value;
            student.district = document.getElementById('editDistrict').value;
            student.grade = document.getElementById('editGrade').value;
            student.parentName = document.getElementById('editParentName').value;
            student.parentPhone = document.getElementById('editParentPhone').value;
            
            localStorage.setItem('sahal_students', JSON.stringify(students));
            Swal.fire('Success!', 'Xogta ardayga waa la beddelay', 'success');
            modal.remove();
            renderPage('students');
        };
    }
    
    function deleteStudent(studentId, studentName) {
        Swal.fire({
            title: 'Ma hubtaa?',
            text: `Waxaad rabtaa inaad tirtirto ${studentName}`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Haa, Tirtir!',
            cancelButtonText: 'Maya'
        }).then((result) => {
            if (result.isConfirmed) {
                students = students.filter(s => s.id !== studentId);
                localStorage.setItem('sahal_students', JSON.stringify(students));
                examMarks = examMarks.filter(m => m.studentId !== studentId);
                localStorage.setItem('sahal_exam_marks', JSON.stringify(examMarks));
                payments = payments.filter(p => p.studentId !== studentId);
                localStorage.setItem('sahal_payments', JSON.stringify(payments));
                Swal.fire('Deleted!', 'Ardayga waa la tirtiray', 'success');
                renderPage('students');
            }
        });
    }

    // ==================== RENDER PAGES ====================
    function renderPage(page) {
        const container = document.getElementById('pageContent');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        sidebar.classList.add('hidden');
        mainContent.classList.add('sidebar-hidden');
        
        switch(page) {
            case 'register': renderRegister(container); break;
            case 'students': renderStudents(container); break;
            case 'exam': renderExam(container); break;
            case 'payment': renderPayment(container); break;
            case 'statement': renderStatement(container); break;
            case 'transfer': renderTransfer(container); break;
            default: renderRegister(container);
        }
    }

    function renderExam(container) {
        container.innerHTML = `
            <div class="content-card">

                <div class="form-row">
                    <div class="form-group"><label>Dooro Bisha</label><select id="examMonth">${months.map(m => `<option value="${m.id}">${m.name}</option>`).join('')}</select></div>
                    <div class="form-group"><label>Dooro Fasalka</label><select id="examGradeSelect"><option value="">Dooro Fasalka</option>${Object.keys(subjectsByGrade).map(g => `<option>${g}</option>`).join('')}</select></div>
                </div>

                </div>

                </div>
                <div id="existingMarksInfo" style="margin-top:20px;padding:15px;background:rgba(249,115,22,0.1);border-radius:16px;"><h4 style="color:#f97316;"><i class="fas fa-history"></i> Marks Hore U Jira</h4><div id="existingMarksList"></div></div>
            </div>
        `;
        
        function loadSubjects() {
            const grade = document.getElementById('examGradeSelect').value;
            if (grade && subjectsByGrade[grade]) {
                document.getElementById('examSubjectSelect').innerHTML = '<option value="">Dooro Maadada</option>' + subjectsByGrade[grade].map(s => `<option value="${s}">${s}</option>`).join('');
            }
        }
        
        function loadStudents() {
            const grade = document.getElementById('examGradeSelect').value;
            if (grade) {
                const gradeStudents = students.filter(s => s.grade === grade);
                document.getElementById('examStudentSelect').innerHTML = gradeStudents.length ? '<option value="">Dooro Ardayga</option>' + gradeStudents.map(s => `<option value="${s.id}">${s.name} (${s.id})</option>`).join('') : '<option value="">Arday ma jiraan</option>';
                loadSubjects();
            }
        }
        
        function loadExistingMarks() {
            const monthId = parseInt(document.getElementById('examMonth').value);
            const studentId = document.getElementById('examStudentSelect').value;
            const subject = document.getElementById('examSubjectSelect').value;
            if (!studentId || !subject) { document.getElementById('existingMarksList').innerHTML = '<p>Fadlan dooro ardayga iyo maadada</p>'; return; }
            const existingMark = examMarks.find(m => m.studentId === studentId && m.subject === subject && m.monthId === monthId);
            document.getElementById('existingMarksList').innerHTML = existingMark ? `<div style="background:rgba(34,197,94,0.2);padding:12px;border-radius:12px;"><i class="fas fa-check-circle" style="color:#22c55e;"></i> Mark hore: ${existingMark.mark}%<br><small>Haddii aad beddesho, soo gali mark cusub oo dhaho Save</small></div>` : '<p>Marks lama diiwaangelin</p>';
        }
        
        document.getElementById('examGradeSelect').onchange = () => loadStudents();
        document.getElementById('examStudentSelect').onchange = () => loadExistingMarks();
        document.getElementById('examSubjectSelect').onchange = () => loadExistingMarks();
        document.getElementById('examMonth').onchange = () => loadExistingMarks();
        
        document.getElementById('saveExamMarkBtn').onclick = () => {
            const monthId = parseInt(document.getElementById('examMonth').value);
            const grade = document.getElementById('examGradeSelect').value;
            const studentId = document.getElementById('examStudentSelect').value;
            const studentName = document.getElementById('examStudentSelect').selectedOptions[0]?.text.split('(')[0];
            const subject = document.getElementById('examSubjectSelect').value;
            const mark = parseInt(document.getElementById('examMark').value);
            if (!grade || !studentId || !subject || !mark) { Swal.fire('Error!', 'Fadlan buuxi dhammaan qaybaha', 'error'); return; }
            if (mark < 0 || mark > 100) { Swal.fire('Error!', 'Marks waa inuu ka dhexeeyaa 0 ilaa 100', 'error'); return; }
            examMarks = examMarks.filter(m => !(m.studentId === studentId && m.subject === subject && m.monthId === monthId));
            examMarks.push({ id: Date.now(), studentId, studentName, grade, subject, mark, monthId, monthName: months.find(m => m.id === monthId)?.name });
            localStorage.setItem('sahal_exam_marks', JSON.stringify(examMarks));
            Swal.fire('Success!', `Marks loogu talagalay ${subject} waa la kaydiyay`, 'success');
            document.getElementById('examMark').value = '';
            loadExistingMarks();
        };
        loadStudents();
    }

    function renderPayment(container) {
        container.innerHTML = `
            <div class="content-card">
                <h2><i class="fas fa-money-bill-wave"></i> Lacag Qabasho</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-chalkboard"></i> Dooro Fasalka</label>
                        <select id="paymentGrade">
                            <option value="">Dooro Fasalka</option>
                            ${[...new Set(students.map(s => s.grade))].map(g => `<option>${g}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Dooro Ardayga</label>
                        <select id="paymentStudent">
                            <option value="">Marka hore dooro Fasalka</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-dollar-sign"></i> Lacagta Bixiyay</label>
                        <input type="number" id="paymentAmount" placeholder="Lacagta bixiyay" min="0" step="1000">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-hourglass-half"></i> Inta ku hartay (Haray)</label>
                        <input type="number" id="remainingAmount" placeholder="Geli hadhka ku hartay" min="0" step="1000">
                        <small style="color: #ffd700; display: block; margin-top: 5px;"><i class="fas fa-info-circle"></i> Adiga ayaa galiya hadhka ku hartay</small>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> Taariikhda</label>
                        <input type="date" id="paymentDate" value="${new Date().toISOString().split('T')[0]}">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-sticky-note"></i> Qoraal (Optional)</label>
                        <input type="text" id="paymentNote" placeholder="Tusaale: Bisha 1aad, Lacagta Dugsiga">
                    </div>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 10px;">
                    <button class="btn-primary" id="savePayment"><i class="fas fa-save"></i> Save Lacag</button>
                    <button class="btn-secondary" id="printPaymentsBtn"><i class="fas fa-print"></i> Print Payment History</button>
                </div>
                <div id="paymentHistory" style="margin-top: 25px;"></div>
            </div>
        `;
        
        function loadStudents(grade) {
            const gradeStudents = students.filter(s => s.grade === grade);
            const studentSelect = document.getElementById('paymentStudent');
            if (gradeStudents.length === 0) {
                studentSelect.innerHTML = '<option value="">Arday ma jiraan fasalkan</option>';
            } else {
                studentSelect.innerHTML = '<option value="">Dooro Ardayga</option>' + 
                    gradeStudents.map(s => `<option value="${s.id}">${s.name} (${s.id})</option>`).join('');
            }
        }
        
        function loadPaymentHistory() {
            const studentId = document.getElementById('paymentStudent').value;
            if (!studentId) {
                document.getElementById('paymentHistory').innerHTML = '';
                return;
            }
            
            const studentPayments = payments.filter(p => p.studentId === studentId);
            if (studentPayments.length === 0) {
                document.getElementById('paymentHistory').innerHTML = '<div style="text-align:center; padding:20px; color:#94a3b8;"><i class="fas fa-info-circle"></i> Lacag lama kaydin ardaygan</div>';
                return;
            }
            
            studentPayments.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            let totalPaid = 0;
            studentPayments.forEach(p => { totalPaid += p.amount; });
            const latestRemaining = studentPayments[0]?.remaining || 0;
            
            let html = `
                <h3 style="color:#f97316; margin-top:20px;"><i class="fas fa-history"></i> Taariikhda Lacagaha</h3>
                <div style="background: rgba(34,197,94,0.1); padding: 12px; border-radius: 16px; margin-bottom: 15px;">
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap;">
                        <span><strong>💰 Wadarta Lacagta La Bixiyay:</strong> <span class="amount-paid">$${totalPaid.toLocaleString()}</span></span>
                        <span><strong>📊 Hadhka Hada Ku Hartay:</strong> <span class="${latestRemaining > 0 ? 'remaining-negative' : 'amount-paid'}">$${latestRemaining.toLocaleString()}</span></span>
                    </div>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Taariikhda</th>
                                <th>Lacagta Bixiyay</th>
                                <th>Hadhka Ku Hartay</th>
                                <th>Qoraal</th>
                                <th class="no-print">Ficil</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            studentPayments.forEach(p => {
                html += `
                    <tr>
                        <td>${p.date}</td>
                        <td class="amount-paid">$${p.amount.toLocaleString()}侧
                        <td class="${p.remaining > 0 ? 'remaining-negative' : 'amount-paid'}">$${p.remaining.toLocaleString()}侧
                        <td>${p.note || '-'}侧
                        <td class="no-print">
                            <button class="btn-delete" onclick="window.deletePayment(${p.id})"><i class="fas fa-trash"></i> Delete</button>
                        侧
                    比
                `;
            });
            
            html += `
                        </tbody>
                    赶
                </div>
            `;
            document.getElementById('paymentHistory').innerHTML = html;
        }
        
        document.getElementById('paymentGrade').onchange = (e) => {
            if (e.target.value) {
                loadStudents(e.target.value);
                document.getElementById('paymentHistory').innerHTML = '';
                document.getElementById('paymentAmount').value = '';
                document.getElementById('remainingAmount').value = '';
            }
        };
        
        document.getElementById('paymentStudent').onchange = () => {
            loadPaymentHistory();
            const studentId = document.getElementById('paymentStudent').value;
            if (studentId) {
                const studentPayments = payments.filter(p => p.studentId === studentId);
                if (studentPayments.length > 0) {
                    const latestRemaining = studentPayments[studentPayments.length - 1]?.remaining || 0;
                    document.getElementById('remainingAmount').value = latestRemaining;
                } else {
                    document.getElementById('remainingAmount').value = '';
                }
            }
        };
        
        document.getElementById('savePayment').onclick = () => {
            const studentId = document.getElementById('paymentStudent').value;
            const studentName = document.getElementById('paymentStudent').selectedOptions[0]?.text.split('(')[0];
            const amount = parseInt(document.getElementById('paymentAmount').value);
            const remaining = parseInt(document.getElementById('remainingAmount').value);
            const date = document.getElementById('paymentDate').value;
            const note = document.getElementById('paymentNote').value;
            
            if (!studentId) {
                Swal.fire('Error!', 'Fadlan dooro ardayga', 'error');
                return;
            }
            
            if (!amount || amount <= 0) {
                Swal.fire('Error!', 'Fadlan geli lacagta bixiyay', 'error');
                return;
            }
            
            if (isNaN(remaining)) {
                Swal.fire('Error!', 'Fadlan geli hadhka ku hartay', 'error');
                return;
            }
            
            const newPayment = {
                id: Date.now(),
                studentId: studentId,
                studentName: studentName,
                amount: amount,
                remaining: remaining,
                date: date,
                note: note || ''
            };
            
            payments.push(newPayment);
            localStorage.setItem('sahal_payments', JSON.stringify(payments));
            Swal.fire('Success!', 'Lacagta waa la kaydiyay', 'success');
            
            document.getElementById('paymentAmount').value = '';
            document.getElementById('paymentNote').value = '';
            loadPaymentHistory();
        };
        
        window.deletePayment = (paymentId) => {
            Swal.fire({
                title: 'Ma hubtaa?',
                text: 'Waxaad rabtaa inaad tirtirto lacagtan',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Haa, Tirtir!',
                cancelButtonText: 'Maya'
            }).then((result) => {
                if (result.isConfirmed) {
                    payments = payments.filter(p => p.id !== paymentId);
                    localStorage.setItem('sahal_payments', JSON.stringify(payments));
                    Swal.fire('Deleted!', 'Lacagta waa la tirtiray', 'success');
                    loadPaymentHistory();
                }
            });
        };
        
        document.getElementById('printPaymentsBtn').onclick = () => {
            const studentId = document.getElementById('paymentStudent').value;
            if (!studentId) {
                Swal.fire('Warning!', 'Fadlan dooro ardayga', 'warning');
                return;
            }
            const student = students.find(s => s.id === studentId);
            if (!student) return;
            
            const studentPayments = payments.filter(p => p.studentId === studentId);
            if (studentPayments.length === 0) {
                Swal.fire('Warning!', 'Ma jiraan lacag lagu daabaco', 'warning');
                return;
            }
            
            studentPayments.sort((a, b) => new Date(b.date) - new Date(a.date));
            let totalPaid = 0;
            studentPayments.forEach(p => { totalPaid += p.amount; });
            const latestRemaining = studentPayments[0]?.remaining || 0;
            
            let printHTML = `
                <div style="text-align: center; margin-bottom: 30px; padding: 20px; background: linear-gradient(135deg, #8B4513, #a0522d); border-radius: 16px;">
                    <h1 style="color: #ffd700; margin: 0;">SAHAL PRIMARY & SECONDARY SCHOOLS</h1>
                    <p style="margin: 8px 0 0; color: #fff;">Taariikhda Lacagaha</p>
                    <p style="margin: 5px 0 0; color: #ffd700;">${student.name}</p>
                    <p style="font-size: 12px; color: #f0f0f0;">La daabacay: ${new Date().toLocaleString()}</p>
                </div>
                <div style="margin-bottom: 20px; padding: 15px; background: #f5f5f5; border-radius: 12px;">
                    <p><strong>📝 Magaca Ardayga:</strong> ${student.name}</p>
                    <p><strong>🆔 ID:</strong> ${student.id}</p>
                    <p><strong>💰 Wadarta Lacagta La Bixiyay:</strong> $${totalPaid.toLocaleString()}</p>
                    <p><strong>📊 Hadhka Ku Hartay:</strong> $${latestRemaining.toLocaleString()}</p>
                </div>
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background-color: #8B4513; color: white;">
                            <th style="border: 1px solid #000; padding: 8px;">Taariikhda</th>
                            <th style="border: 1px solid #000; padding: 8px;">Lacagta Bixiyay</th>
                            <th style="border: 1px solid #000; padding: 8px;">Hadhka Ku Hartay</th>
                            <th style="border: 1px solid #000; padding: 8px;">Qoraal</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            studentPayments.forEach(p => {
                printHTML += `
                    <tr>
                        <td style="border: 1px solid #000; padding: 6px;">${p.date}</td>
                        <td style="border: 1px solid #000; padding: 6px;">$${p.amount.toLocaleString()}</td>
                        <td style="border: 1px solid #000; padding: 6px;">$${p.remaining.toLocaleString()}</td>
                        <td style="border: 1px solid #000; padding: 6px;">${p.note || '-'}</td>
                    </tr>
                `;
            });
            
            printHTML += `
                    </tbody>
                </table>
            `;
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>Lacag Qabasho - ${student.name}</title>
                    <style>
                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        body { font-family: Arial, sans-serif; padding: 30px; }
                    </style>
                </head>
                <body>${printHTML}</body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
            printWindow.close();
        };
    }

        document.getElementById('fromGrade').onchange = () => { 
            if(document.getElementById('transferType').value === 'one') 
                document.getElementById('singleStudent').innerHTML = students.filter(s => s.grade === document.getElementById('fromGrade').value).map(s => `<option value="${s.id}">${s.name}</option>`).join(''); 
        };
        document.getElementById('transferBtn').onclick = () => { 
            const type = document.getElementById('transferType').value; 
            const fromGrade = document.getElementById('fromGrade').value; 
            const toGrade = document.getElementById('toGrade').value; 
            if(type === 'all') students.forEach(s => { if(s.grade === fromGrade) s.grade = toGrade; }); 
            else { const student = students.find(s => s.id === document.getElementById('singleStudent').value); if(student) student.grade = toGrade; } 
            localStorage.setItem('sahal_students', JSON.stringify(students)); 
            Swal.fire('Success!', 'Fasal badalid waa lagu guuleystay', 'success'); 
        };
    }

    window.editStudent = editStudent;
    window.deleteStudent = deleteStudent;

    document.querySelectorAll('.nav-item').forEach(item => { 
        item.addEventListener('click', () => { 
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); 
            item.classList.add('active'); 
            renderPage(item.dataset.page); 
        }); 
    });
    document.getElementById('menuToggle').onclick = () => { 
        document.getElementById('sidebar').classList.toggle('hidden'); 
        document.getElementById('mainContent').classList.toggle('sidebar-hidden'); 
    };
    document.getElementById('loginBtn').onclick = () => { 
        const user = document.getElementById('loginUsername').value; 
        const pass = document.getElementById('loginPassword').value; 
        if(user === 'Maa' && pass === '123') { 
            document.getElementById('loginContainer').style.display = 'none'; 
            document.getElementById('dashboard').style.display = 'block'; 
            renderPage('register'); 
            document.querySelector('.nav-item').classList.add('active'); 
        } else Swal.fire('Error!', 'Username ama Password waa qalad', 'error'); 
    };
    document.getElementById('logoutBtn').onclick = () => { 
        document.getElementById('loginContainer').style.display = 'flex'; 
        document.getElementById('dashboard').style.display = 'none'; 
    };
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('mainContent').classList.add('sidebar-hidden');
</script>
</body>
</html>
